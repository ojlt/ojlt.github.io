theme = 'hugo-bearblog'

[params]
description = "A simple blog about interesting things."

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 5

[[menu.main]]
  name = "Music"                    # The text that will appear in the menu
  url = "/music/"                   # The link to your new page
  weight = 20         # A number to control the order

[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 10

# Let MathJax handle $...$ / $$...$$ — Goldmark passes the delimited content
# through untouched, so underscores and asterisks in maths aren't mangled.
[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block = [['\[', '\]'], ['$$', '$$']]
    inline = [['\(', '\)'], ['$', '$']]
